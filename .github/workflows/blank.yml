name: Run Doodstream Firebase Bot

on:
  schedule:
    - cron: '0 */2 * * *' # Yeh har 2 ghante mein script run karega
  workflow_dispatch: # Isse tum manually bhi button daba kar run kar sakte ho

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Python version set kar diya

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run the script
      run: python main.py
